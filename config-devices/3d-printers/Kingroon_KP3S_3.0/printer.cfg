[include mainsail.cfg]
[include macros.cfg]

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 2500
max_z_velocity: 25
max_z_accel: 100

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[virtual_sdcard]
path: /home/len/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[stepper_x]
step_pin: PE3
dir_pin: PE2
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
endstop_pin: !PA15
position_endstop: 0
position_max: 180
homing_speed: 50
#homing_retract_dist: 0
#second_homing_speed: 3

[stepper_y]
step_pin: PE0
dir_pin: PB9
enable_pin: !PE1
microsteps: 32
rotation_distance: 40
endstop_pin: !PA12
position_endstop: 0
position_max: 180
homing_speed: 50


[stepper_z]
step_pin: PB5
dir_pin: !PB4
enable_pin: !PB8
microsteps: 32
rotation_distance: 8
endstop_pin: !PA11
position_endstop : 2.1
position_max: 180
position_min: 0.2    # <--- ADD THIS LINE
second_homing_speed: 3
homing_speed: 10

[safe_z_home]
home_xy_position: 90,90
z_hop: 10

[input_shaper]
shaper_freq_x: 29.39
shaper_type_x: mzv
shaper_freq_y: 22.73
shaper_type_y: mzv

[thermistor Kingroon_B3950]
temperature1: 25.0
resistance1: 103180.0
temperature2: 150.0
resistance2: 1366.2
temperature3: 250.0
resistance3: 168.6

[extruder]
step_pin: PD6
dir_pin: !PD3
enable_pin: !PB3
microsteps: 32
gear_ratio: 3:1
rotation_distance: 23.244
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC3
sensor_type: Kingroon_B3950
sensor_pin: PC1
min_temp: 0
max_temp: 250
pressure_advance: 0.065
control : pid
pid_kp : 21.126
pid_ki : 0.985
pid_kd : 113.290

[heater_bed]
heater_pin: PA0
sensor_type: Kingroon_B3950
sensor_pin: PC0
control = pid
pid_kp = 57.126
pid_ki = 0.933
pid_kd = 874.029
min_temp: 0
max_temp: 130

[fan]
pin: PB1

# Use BED_SCREWS_ADJUST
[bed_screws]
screw1: 100, 50
screw2: 100, 150
screw3: 150, 100

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 15, 15
mesh_max: 165, 165
probe_count: 3, 3   # Use 3x3 for manual (9 points). 5x5 (25 points) is too slow by hand!
fade_start: 1.0
fade_end: 10.0
# This tells Klipper you are doing it manually
# It will pop up a window in Mainsail/Fluidd for each point

[static_digital_output display_reset]
pins: !PC6, !PD13

