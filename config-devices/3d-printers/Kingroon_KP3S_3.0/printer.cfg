[include mainsail.cfg]

[virtual_sdcard]
path: /home/len/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[stepper_x]
step_pin: PE3
dir_pin: PE2
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
endstop_pin: !PA15
position_endstop: 0
position_max: 180
homing_speed: 50
#homing_retract_dist: 0
#second_homing_speed: 3

[stepper_y]
step_pin: PE0
dir_pin: PB9
enable_pin: !PE1
microsteps: 32
rotation_distance: 40
endstop_pin: !PA12
position_endstop: 0
position_max: 180
homing_speed: 50

[stepper_z]
step_pin: PB5
dir_pin: !PB4
enable_pin: !PB8
microsteps: 32
rotation_distance: 8
endstop_pin: !PA11
position_endstop: 2
position_max: 180
position_min: 0.2    # <--- ADD THIS LINE

[safe_z_home]
home_xy_position: 90,90
z_hop: 10

[thermistor Kingroon_B3950]
temperature1: 25.0
resistance1: 103180.0
temperature2: 150.0
resistance2: 1366.2
temperature3: 250.0
resistance3: 168.6

[extruder]
step_pin: PD6
dir_pin: !PD3
enable_pin: !PB3
microsteps: 32
gear_ratio: 3:1
rotation_distance: 23.244
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC3
sensor_type: Kingroon_B3950
sensor_pin: PC1
control: pid
pid_kp: 27.057
pid_ki: 1.171
pid_kd: 156.254
min_temp: 0
max_temp: 250

[heater_bed]
heater_pin: PA0
sensor_type: Kingroon_B3950
sensor_pin: PC0
control: pid
pid_kp: 61.779
pid_ki: 1.572
pid_kd: 606.980
min_temp: 0
max_temp: 130

[fan]
pin: PB1

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 2000
max_z_velocity: 25
max_z_accel: 100

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 15, 15
mesh_max: 165, 165
probe_count: 3, 3   # Use 3x3 for manual (9 points). 5x5 (25 points) is too slow by hand!
fade_start: 1.0
fade_end: 10.0
# This tells Klipper you are doing it manually
# It will pop up a window in Mainsail/Fluidd for each point

[static_digital_output display_reset]
pins: !PC6, !PD13


[gcode_macro START_PRINT]
gcode:
    # 1. Get temperatures from Slicer
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    # 2. Start heating and Home
    M140 S{BED_TEMP}       ; Start bed heat
    G90                    ; Absolute positioning
    G28                    ; Home all axes  
    # 3. Wait for bed temp (Important for thermal expansion!)
    M190 S{BED_TEMP}
    # 4. LOAD THE SAVED MESH
    BED_MESH_PROFILE LOAD=default
    # 5. Move to wait position and heat nozzle
    G1 X5 Y5 Z10 F5000     ; Move to corner, stay 10mm up for safety
    M109 S{EXTRUDER_TEMP}  ; Wait for nozzle temp
    # 6. Purge line for 0.6mm nozzle
    G92 E0 
    G1 Z0.3 F3000
    G1 Y150 E18 F1500      ; Slightly more plastic for the 0.6 nozzle
    G92 E0
    G1 Z2.0 F3000          ; Lift and start print

